<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="1200" height="430">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="430" fill="#faf6ed" stroke="#2c2417" stroke-width="3" rx="0"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#2c2417" rx="0"/>
  <text x="16" y="24" font-size="14" font-weight="bold" fill="#faf6ed" font-family="'IBM Plex Mono', monospace">tree-sitter-sysml</text>
  <text x="1184" y="24" font-size="11" fill="#c4b99a" text-anchor="end" font-family="'IBM Plex Mono', monospace">Tree-sitter Grammar</text>

  <!-- OV-1: SysML v2 source -> Tree-sitter parser -> Parse tree (AST nodes) -->

  <!-- Input: SysML v2 Source -->
  <rect x="80" y="115" width="220" height="140" fill="none" stroke="#2c2417" stroke-width="2" rx="0"/>
  <text x="190" y="142" font-size="13" fill="#2c2417" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-weight="bold">SysML v2 Source</text>
  <line x1="110" y1="152" x2="270" y2="152" stroke="#c4b99a" stroke-width="1"/>
  <text x="110" y="175" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">part def Vehicle {</text>
  <text x="120" y="193" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">part engine;</text>
  <text x="120" y="211" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">part wheels[4];</text>
  <text x="110" y="229" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">}</text>
  <text x="190" y="248" font-size="10" fill="#c4b99a" text-anchor="middle" font-family="'IBM Plex Mono', monospace">UTF-8 text stream</text>

  <!-- Arrow: Input -> Process -->
  <line x1="300" y1="190" x2="420" y2="190" stroke="#2c2417" stroke-width="1.5"/>
  <polygon points="420,185 430,190 420,195" fill="#2c2417"/>

  <!-- Process: Tree-sitter Parser -->
  <rect x="430" y="115" width="340" height="140" fill="none" stroke="#2c2417" stroke-width="2" rx="0"/>
  <rect x="430" y="115" width="340" height="30" fill="#2c2417" rx="0"/>
  <text x="600" y="136" font-size="13" fill="#faf6ed" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-weight="bold">Tree-sitter Parser</text>
  <text x="600" y="170" font-size="11" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">GLR parsing algorithm</text>
  <text x="600" y="190" font-size="11" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">incremental re-parse</text>
  <text x="600" y="210" font-size="11" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">error recovery</text>
  <text x="600" y="243" font-size="10" fill="#c4b99a" text-anchor="middle" font-family="'IBM Plex Mono', monospace">O(n) edit | concrete syntax tree</text>

  <!-- Arrow: Process -> Output -->
  <line x1="770" y1="190" x2="890" y2="190" stroke="#2c2417" stroke-width="1.5"/>
  <polygon points="890,185 900,190 890,195" fill="#2c2417"/>

  <!-- Output: Parse Tree -->
  <rect x="900" y="115" width="220" height="140" fill="none" stroke="#2c2417" stroke-width="2" rx="0"/>
  <text x="1010" y="142" font-size="13" fill="#2c2417" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-weight="bold">Parse Tree</text>
  <line x1="930" y1="152" x2="1090" y2="152" stroke="#c4b99a" stroke-width="1"/>
  <!-- Tree structure -->
  <text x="1010" y="172" font-size="11" fill="#2c2417" text-anchor="middle" font-family="'IBM Plex Mono', monospace">source_file</text>
  <line x1="1010" y1="176" x2="970" y2="188" stroke="#6b5d4f" stroke-width="1"/>
  <line x1="1010" y1="176" x2="1050" y2="188" stroke="#6b5d4f" stroke-width="1"/>
  <text x="970" y="200" font-size="10" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">part_def</text>
  <line x1="970" y1="204" x2="940" y2="216" stroke="#6b5d4f" stroke-width="1"/>
  <line x1="970" y1="204" x2="1000" y2="216" stroke="#6b5d4f" stroke-width="1"/>
  <text x="940" y="228" font-size="9" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">name</text>
  <text x="1000" y="228" font-size="9" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">body</text>
  <text x="1050" y="200" font-size="10" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">...</text>

  <!-- Footer -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="380" font-size="10" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace">Incremental parsing for SysML v2 with tree-sitter</text>

  <!-- Built with GitLab -->
  <text x="590" y="408" text-anchor="middle" fill="#2c2417" font-size="9" font-weight="600" font-family="'IBM Plex Mono', monospace">Built with GitLab</text>
  <g transform="translate(634, 397) scale(0.045)">
    <path d="M282.83,170.73l-.27-.69-26.14-68.22a6.81,6.81,0,0,0-2.69-3.24,7,7,0,0,0-8,.43,7,7,0,0,0-2.32,3.52l-17.65,54H154.29l-17.65-54A6.86,6.86,0,0,0,134.32,99a7,7,0,0,0-8-.43,6.87,6.87,0,0,0-2.69,3.24L97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82,19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91,40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#E24329"/>
    <path d="M282.83,170.73l-.27-.69a88.3,88.3,0,0,0-35.15,15.8L190,229.25c19.55,14.79,36.57,27.64,36.57,27.64l40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#FC6D26"/>
    <path d="M153.43,256.89l19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91S209.55,244,190,229.25C170.45,244,153.43,256.89,153.43,256.89Z" fill="#FCA326"/>
    <path d="M132.58,185.84A88.19,88.19,0,0,0,97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82s17-12.85,36.57-27.64Z" fill="#FC6D26"/>
  </g>
</svg>
