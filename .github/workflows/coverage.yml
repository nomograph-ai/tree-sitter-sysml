name: Grammar Coverage

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
  pull_request:
    paths:
      - grammar.js
      - src/**
  workflow_dispatch:

jobs:
  coverage:
    name: Parse coverage report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Generate parser
        run: |
          npm ci
          npx tree-sitter generate

      - name: Fetch test corpora
        run: bash scripts/fetch-corpora.sh

      - name: Run parse coverage
        run: |
          bash scripts/test-corpus.sh all --errors-only 2>&1 | tee corpus-results.txt
          
          echo "## Grammar Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat corpus-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload parse results
        uses: actions/upload-artifact@v4
        with:
          name: corpus-results
          path: corpus-results.txt
