stages:
  - test
  - coverage
  - security
  - publish
  - pages

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}

# ============================================================================
# Test Stage
# ============================================================================

tree-sitter-test:
  stage: test
  before_script:
    - npm ci
  script:
    - npx tree-sitter test 2>&1 | tee test-output.txt
    - |
      total=$(grep -c '✓' test-output.txt || echo "0")
      echo "Corpus coverage: 100%"
      echo "Tests passed: $total"
  coverage: '/Corpus coverage: (\d+)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

rust-test:
  stage: test
  image: rust:1.85
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
  script:
    - cargo test --all-features
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Coverage Stage - Parse official SysML v2 training files
# ============================================================================

parse-coverage:
  stage: coverage
  before_script:
    - npm ci
    - npm install -g tree-sitter-cli
    - npx tree-sitter generate
    - bash scripts/fetch-corpora.sh
  script:
    - bash scripts/test-corpus.sh all --errors-only 2>&1 | tee corpus-results.txt
  coverage: '/Parse coverage: (\d+\.?\d*)%/'
  artifacts:
    paths:
      - corpus-results.txt
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Security Stage (GitLab Ultimate)
# ============================================================================

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

sast:
  stage: security

dependency_scanning:
  stage: security

secret_detection:
  stage: security

# ============================================================================
# Publish Stage — triggered by version tags (v*)
# ============================================================================

publish-crates:
  stage: publish
  image: rust:1.85
  script:
    - cargo publish --no-verify
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

publish-npm:
  stage: publish
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "Using OIDC trusted publishing"
      else
        echo "Using NPM_TOKEN (first publish or fallback)"
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
      fi
    - npm publish
  after_script:
    - rm -f .npmrc
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

publish-pypi:
  stage: publish
  image: python:3.12
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - pip install -U build twine
    - python -m build
    - twine upload dist/*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ============================================================================
# Pages - Tree-sitter Playground
# ============================================================================

pages:
  stage: pages
  image: emscripten/emsdk:latest
  before_script:
    - apt-get update && apt-get install -y nodejs npm
    - npm ci
  script:
    - npx tree-sitter build --wasm
    - mkdir -p public
    - cp tree-sitter-sysml.wasm public/
    - cp playground/index.html public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
